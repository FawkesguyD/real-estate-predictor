name: Build and Push to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_ARCHIVE: docker-image.tar

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          image_name="ghcr.io/${REPOSITORY_OWNER}/${REPOSITORY_NAME}"
          echo "image_name=${image_name,,}" >> "${GITHUB_OUTPUT}"
          echo "repository_url=${REPOSITORY_URL}" >> "${GITHUB_OUTPUT}"

      - name: Build Docker image
        run: |
          docker build \
            --label "org.opencontainers.image.source=${{ steps.meta.outputs.repository_url }}" \
            --tag "${{ steps.meta.outputs.image_name }}:latest" \
            --tag "${{ steps.meta.outputs.image_name }}:${GITHUB_SHA}" \
            .

      - name: Save Docker image
        run: |
          docker save \
            --output "${IMAGE_ARCHIVE}" \
            "${{ steps.meta.outputs.image_name }}:latest" \
            "${{ steps.meta.outputs.image_name }}:${GITHUB_SHA}"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ env.IMAGE_ARCHIVE }}
          if-no-files-found: error
          retention-days: 1

  push:
    runs-on: ubuntu-latest
    needs: build
    env:
      IMAGE_NAME: ${{ needs.build.outputs.image_name }}
    permissions:
      packages: write
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load --input "${IMAGE_ARCHIVE}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Push Docker image tags
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"

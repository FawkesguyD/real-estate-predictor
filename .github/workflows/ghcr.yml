name: Build and Push to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ secrets.GHCR_USERNAME }}/${{ github.event.repository.name }}
  IMAGE_ARCHIVE: docker-image.tar

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag "${IMAGE_NAME}:latest" \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            .

      - name: Save Docker image
        run: |
          docker save \
            --output "${IMAGE_ARCHIVE}" \
            "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ env.IMAGE_ARCHIVE }}
          if-no-files-found: error
          retention-days: 1

  push:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load --input "${IMAGE_ARCHIVE}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Push Docker image tags
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"

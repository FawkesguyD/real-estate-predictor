name: Build and Push Images

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "ml/**"
      - ".github/workflows/**"
      - ".dockerignore"
      - "docker-compose.yml"
      - "requirements.txt"
      - "Dockerfile"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Explicit module list keeps CI simple and predictable for the MVP monorepo.
          - module: api
            image_suffix: api
            dockerfile: apps/api/Dockerfile
            context: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Prepare image metadata
        id: meta
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          image_name="ghcr.io/${REPOSITORY_OWNER}/${REPOSITORY_NAME}-${{ matrix.image_suffix }}"
          echo "image_name=${image_name,,}" >> "${GITHUB_OUTPUT}"
          echo "repository_url=${REPOSITORY_URL}" >> "${GITHUB_OUTPUT}"

      - name: Build and push ${{ matrix.module }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:latest
            ${{ steps.meta.outputs.image_name }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ steps.meta.outputs.repository_url }}

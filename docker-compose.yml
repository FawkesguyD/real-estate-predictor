services:
  real-estate-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: real-estate-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
      MODEL_PATH: ${MODEL_PATH:-/app/ml/artifacts/best_model.joblib}
      DEFAULT_FX_RATE: ${DEFAULT_FX_RATE:-90}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; import os; urlopen(f\"http://127.0.0.1:{os.getenv('PORT', '8000')}/health\").read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_reservation: 256m
    mem_limit: 512m
    cpus: 1.0
